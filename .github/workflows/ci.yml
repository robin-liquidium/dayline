name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Show toolchain
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

      - name: Validate automation
        run: |
          bash -n script/*.sh
          ruby -e 'require "yaml"; %w[ci release notarization-continuation].each { |name| YAML.load_file(".github/workflows/#{name}.yml") }'
          git diff --check
          if ./script/tag_release.sh 1.2.3-beta >/dev/null 2>&1; then exit 1; fi
          if MARKETING_VERSION=1.2.3-beta ./script/package_release.sh >/dev/null 2>&1; then exit 1; fi
          if MARKETING_VERSION=1.2.3-beta ./script/publish_github_release.sh >/dev/null 2>&1; then exit 1; fi

  website-test-and-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    defaults:
      run:
        working-directory: website

    steps:
      - name: Check out source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Build
        run: bun run build
