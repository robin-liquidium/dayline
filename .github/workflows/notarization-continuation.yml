name: Continue notarization

on:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:
    inputs:
      tag:
        description: Optional pending stable release tag to check
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: dayline-notarization-continuation
  cancel-in-progress: false

jobs:
  continue-notarization:
    runs-on: macos-26
    timeout-minutes: 45

    env:
      MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      APP_STORE_CONNECT_KEY_P8_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_P8_BASE64 }}
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

    steps:
      - name: Check out release tooling
        uses: actions/checkout@v6
        with:
          ref: main
          persist-credentials: false

      - name: Validate release secrets
        run: |
          for name in \
            MACOS_CERTIFICATE_P12_BASE64 \
            MACOS_CERTIFICATE_PASSWORD \
            APP_STORE_CONNECT_KEY_P8_BASE64 \
            APP_STORE_CONNECT_KEY_ID \
            APP_STORE_CONNECT_ISSUER_ID; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing GitHub Actions secret: $name" >&2
              exit 2
            fi
          done

      - name: Import Developer ID certificate
        run: |
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          keychain_path="$RUNNER_TEMP/dayline-signing.keychain-db"
          keychain_password="$(uuidgen)"

          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | /usr/bin/base64 -D > "$certificate_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 3600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -k "$keychain_path" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -f pkcs12
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"
          security list-keychains -d user -s "$keychain_path"

          identity="$(security find-identity -v -p codesigning "$keychain_path" | awk -F '"' '/Developer ID Application:/ { print $2; exit }')"
          if [[ -z "$identity" ]]; then
            echo "Imported certificate does not contain a Developer ID Application identity." >&2
            exit 2
          fi

          echo "CODESIGN_IDENTITY=$identity" >> "$GITHUB_ENV"
          echo "SIGNING_KEYCHAIN_PATH=$keychain_path" >> "$GITHUB_ENV"
          echo "SIGNING_CERTIFICATE_PATH=$certificate_path" >> "$GITHUB_ENV"

      - name: Write App Store Connect API key
        run: |
          key_path="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_KEY_P8_BASE64" | /usr/bin/base64 -D > "$key_path"
          chmod 600 "$key_path"
          echo "NOTARY_KEY_PATH=$key_path" >> "$GITHUB_ENV"
          echo "NOTARY_KEY_ID=$APP_STORE_CONNECT_KEY_ID" >> "$GITHUB_ENV"
          echo "NOTARY_ISSUER_ID=$APP_STORE_CONNECT_ISSUER_ID" >> "$GITHUB_ENV"

      - name: Advance pending notarization
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: ./script/notarization_release.sh continue

      - name: Clean up signing credentials
        if: always()
        run: |
          if [[ -n "${SIGNING_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$SIGNING_KEYCHAIN_PATH" || true
          fi
          rm -f \
            "${SIGNING_CERTIFICATE_PATH:-}" \
            "${NOTARY_KEY_PATH:-}"
